name: Release

# 推送 v* tag 触发：构建三平台二进制 + Docker 镜像，发布到 GitHub Releases。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 创建 Release / 上传产物
  packages: write   # 推送容器镜像到 GHCR

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ============================================================
  # 三平台二进制构建
  # ============================================================
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo deps
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 前端构建产物由 rust-embed 内嵌进 vpn-server
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf \
            dist/vpn-${{ matrix.target }}.tar.gz vpn-server vpn-cli
        shell: bash

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Compress-Archive -Path target/${{ matrix.target }}/release/vpn-server.exe, target/${{ matrix.target }}/release/vpn-cli.exe -DestinationPath dist/vpn-${{ matrix.target }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # 汇总产物并创建 GitHub Release
  # ============================================================
  release:
    name: Create Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: false

  # ============================================================
  # Docker 镜像（服务端）推送到 GHCR
  # ============================================================
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
