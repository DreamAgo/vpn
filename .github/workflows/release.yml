name: Release

# 推送 v* tag 触发：构建 CLI/GUI 客户端、Linux 服务端和 Docker 镜像，发布到 GitHub Releases。
# 也支持 workflow_dispatch 手动触发（只构建+上传产物工件，不创建 Release），便于不打 tag 先验证。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write   # 创建 Release / 上传产物
  packages: write   # 推送容器镜像到 GHCR

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ============================================================
  # CLI 客户端：Windows exe、macOS amd64/arm、Linux amd64/arm
  # ============================================================
  build-cli:
    name: CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: vpn-cli-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: vpn-cli-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vpn-cli-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vpn-cli-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vpn-cli-windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc-rs 在 Windows/MSVC 需要 NASM 汇编器。
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      # 交叉目标（如 arm mac runner 上编 x86_64-apple-darwin）需显式装 target std，
      # 否则报 error[E0463]: can't find crate for `core`。
      - name: Ensure target std installed
        run: rustup target add ${{ matrix.target }}

      # vpn-cli 的 keyring 在 Linux 经 libdbus-sys 链接系统 libdbus。
      - name: Install libdbus + pkg-config (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache Cargo deps
        uses: Swatinem/rust-cache@v2

      - name: Build vpn-cli
        run: cargo build --release -p vpn-cli --target ${{ matrix.target }}

      - name: Package CLI (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.artifact }}.tar.gz vpn-cli

      - name: Package CLI (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item target/${{ matrix.target }}/release/vpn-cli.exe dist/${{ matrix.artifact }}.exe
          Compress-Archive -Path dist/${{ matrix.artifact }}.exe -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  # ============================================================
  # Linux 服务端：只发布 Linux amd64/arm
  # ============================================================
  build-linux-server:
    name: Server ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: vpn-server-linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: vpn-server-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target std installed
        run: rustup target add ${{ matrix.target }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Cache Cargo deps
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 前端构建产物由 rust-embed 内嵌进 vpn-server。
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build vpn-server
        run: cargo build --release -p vpn-server --target ${{ matrix.target }}

      - name: Package server
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.artifact }}.tar.gz vpn-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  # ============================================================
  # Windows CLI 安装器（Inno Setup）：vpn-cli.exe + wintun.dll + PATH/服务注册
  # ============================================================
  windows-cli-installer:
    name: Windows CLI installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo deps
        uses: Swatinem/rust-cache@v2

      # aws-lc-rs 在 Windows/MSVC 需要 NASM 汇编器。
      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      # WireGuard 官方 wintun.dll，随包分发（tun crate 运行时加载）。
      - name: Fetch wintun.dll
        shell: pwsh
        run: |
          $v = "0.14.1"
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-$v.zip" -OutFile "$env:TEMP\wintun.zip"
          Expand-Archive -Path "$env:TEMP\wintun.zip" -DestinationPath "$env:TEMP\wintun" -Force
          Copy-Item "$env:TEMP\wintun\wintun\bin\amd64\wintun.dll" "packaging\windows\wintun.dll" -Force

      - name: Build vpn-cli.exe
        run: cargo build --release --bin vpn-cli

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(.+)$') { $ver = $Matches[1] } else { $ver = "0.1.0" }
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer (ISCC)
        shell: pwsh
        run: pwsh packaging/windows/build-installer.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-cli-windows-installer
          path: dist/vpn-cli-setup-*.exe

  # ============================================================
  # Windows 桌面 GUI 客户端（Tauri 2）：MSI + NSIS 安装器（内置 wintun.dll + UAC 自提权）
  # ============================================================
  windows-desktop:
    name: Windows desktop app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo deps (desktop standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Fetch wintun.dll (bundled by tauri.windows.conf.json)
        shell: pwsh
        run: pwsh desktop/scripts/fetch-wintun.ps1

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Tauri build (MSI + NSIS)
        if: github.event_name == 'workflow_dispatch'
        working-directory: desktop
        run: npx tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Tauri build (MSI + NSIS + updater signatures)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret required for tagged releases."
          }
          npx tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.sig
            desktop/src-tauri/target/release/bundle/nsis/*.sig

  # ============================================================
  # macOS 桌面 GUI 客户端（Tauri 2）：DMG amd64 + arm64
  # ============================================================
  macos-desktop:
    name: macOS desktop app ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            arch: amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target std installed
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo deps (desktop standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Tauri build (DMG)
        if: github.event_name == 'workflow_dispatch'
        working-directory: desktop
        run: npx tauri build --target ${{ matrix.target }} --bundles dmg --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Tauri build (DMG + updater signatures)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret required for tagged releases." >&2
            exit 1
          fi
          npx tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-desktop-macos-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.sig

  # ============================================================
  # Linux 桌面 GUI 客户端（Tauri 2）：AppImage + deb amd64/arm64
  # ============================================================
  linux-desktop:
    name: Linux desktop app ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target std installed
        run: rustup target add ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev \
            pkg-config

      - name: Cache Cargo deps (desktop standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Tauri build (AppImage + deb)
        if: github.event_name == 'workflow_dispatch'
        working-directory: desktop
        run: npx tauri build --target ${{ matrix.target }} --bundles appimage,deb --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Tauri build (AppImage + deb + updater signatures)
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret required for tagged releases." >&2
            exit 1
          fi
          npx tauri build --target ${{ matrix.target }} --bundles appimage,deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-desktop-linux-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.sig
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.sig

  # ============================================================
  # 汇总产物并创建 GitHub Release（仅 tag 触发；手动 dispatch 只留工件）
  # ============================================================
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-cli
      - build-linux-server
      - windows-cli-installer
      - windows-desktop
      - macos-desktop
      - linux-desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Tauri updater manifest
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          from urllib.parse import quote

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          repo = os.environ["GITHUB_REPOSITORY"]
          root = Path("artifacts")

          exe_candidates = sorted(root.glob("vpn-desktop-windows/**/*.exe"))
          if not exe_candidates:
            raise SystemExit("missing Windows desktop NSIS installer for updater manifest")
          exe = exe_candidates[0]
          sig = Path(str(exe) + ".sig")
          if not sig.exists():
            sibling = exe.with_suffix(exe.suffix + ".sig")
            sig = sibling
          if not sig.exists():
            raise SystemExit(f"missing updater signature for {exe}")

          filename = quote(exe.name)
          manifest = {
            "version": version,
            "notes": f"VPN Client {version}",
            "pub_date": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
            "platforms": {
              "windows-x86_64": {
                "signature": sig.read_text(encoding="utf-8").strip(),
                "url": f"https://github.com/{repo}/releases/download/{tag}/{filename}",
              }
            },
          }
          (root / "latest.json").write_text(
            json.dumps(manifest, ensure_ascii=False, indent=2),
            encoding="utf-8",
          )
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: false

  # ============================================================
  # Docker 镜像（服务端）推送到 GHCR
  # ============================================================
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
