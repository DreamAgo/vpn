name: Release

# 推送 v* tag 触发：构建三平台二进制 + Windows 安装包 + Docker 镜像，发布到 GitHub Releases。
# 也支持 workflow_dispatch 手动触发（只构建+上传产物工件，不创建 Release），便于不打 tag 先验证。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write   # 创建 Release / 上传产物
  packages: write   # 推送容器镜像到 GHCR

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ============================================================
  # 三平台二进制构建
  # ============================================================
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc-rs 在 Windows/MSVC 需要 NASM 汇编器。
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Cache Cargo deps
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 前端构建产物由 rust-embed 内嵌进 vpn-server
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf \
            dist/vpn-${{ matrix.target }}.tar.gz vpn-server vpn-cli
        shell: bash

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          Compress-Archive -Path target/${{ matrix.target }}/release/vpn-server.exe, target/${{ matrix.target }}/release/vpn-cli.exe -DestinationPath dist/vpn-${{ matrix.target }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vpn-${{ matrix.target }}
          path: dist/*

  # ============================================================
  # Windows CLI 安装器（Inno Setup）：vpn-cli.exe + wintun.dll + PATH/服务注册
  # ============================================================
  windows-cli-installer:
    name: Windows CLI installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo deps
        uses: Swatinem/rust-cache@v2

      # aws-lc-rs 在 Windows/MSVC 需要 NASM 汇编器。
      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      # WireGuard 官方 wintun.dll，随包分发（tun crate 运行时加载）。
      - name: Fetch wintun.dll
        shell: pwsh
        run: |
          $v = "0.14.1"
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/wintun-$v.zip" -OutFile "$env:TEMP\wintun.zip"
          Expand-Archive -Path "$env:TEMP\wintun.zip" -DestinationPath "$env:TEMP\wintun" -Force
          Copy-Item "$env:TEMP\wintun\wintun\bin\amd64\wintun.dll" "packaging\windows\wintun.dll" -Force

      - name: Build vpn-cli.exe
        run: cargo build --release --bin vpn-cli

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(.+)$') { $ver = $Matches[1] } else { $ver = "0.1.0" }
          "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build installer (ISCC)
        shell: pwsh
        run: pwsh packaging/windows/build-installer.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vpn-cli-windows-installer
          path: dist/vpn-cli-setup-*.exe

  # ============================================================
  # Windows 桌面 GUI 客户端（Tauri 2）：MSI + NSIS 安装器（内置 wintun.dll + UAC 自提权）
  # ============================================================
  windows-desktop:
    name: Windows desktop app
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo deps (desktop standalone workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" >> $env:GITHUB_PATH

      - name: Fetch wintun.dll (bundled by tauri.windows.conf.json)
        shell: pwsh
        run: pwsh desktop/scripts/fetch-wintun.ps1

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      - name: Tauri build (MSI + NSIS)
        working-directory: desktop
        run: npx tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vpn-desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe

  # ============================================================
  # 汇总产物并创建 GitHub Release（仅 tag 触发；手动 dispatch 只留工件）
  # ============================================================
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-binaries, windows-cli-installer, windows-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: false

  # ============================================================
  # Docker 镜像（服务端）推送到 GHCR
  # ============================================================
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
